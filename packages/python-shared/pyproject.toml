[project]
name = "content-mirror-shared"
version = "0.0.0"
description = "Shared models, DB helpers, and constants for sharpey."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/content_mirror_shared"]
